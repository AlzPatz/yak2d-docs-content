name: Build Documentation

on:
  repository_dispatch:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: build-documentation
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04

    defaults:
      run:
        shell: bash
        working-directory: docs

    steps:
      - name: Checkout Current Articles Repo
        uses: actions/checkout@v6
        with:
          path: docs
          fetch-depth: 1

      - name: Checkout Source Code Repo
        uses: actions/checkout@v6
        with:
          repository: AlzPatz/yak2d
          ref: master
          fetch-depth: 1
          path: docs/sourcerepo
          token: ${{ secrets.DOCUMENTATION_MANAGEMENT_TOKEN }}

      - name: Extract API Source and put into correct folder, then delete sourcerepo
        run: |
          set -euo pipefail

          mkdir -p src

          cp -a sourcerepo/src/Yak2D.Api/. src/
          cp -a sourcerepo/src/Yak2D/. src/

          rm -rf sourcerepo

      - name: Checkout Live Docs Repo
        uses: actions/checkout@v6
        with:
          repository: AlzPatz/yak2d-docs
          ref: master
          fetch-depth: 1
          path: docs/live
          token: ${{ secrets.DOCUMENTATION_MANAGEMENT_TOKEN }}
          persist-credentials: true

      - name: Clear live docs repo
        working-directory: docs/live
        run: |
          set -euo pipefail
          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install DocFX
        working-directory: .
        run: |
          set -euo pipefail
          dotnet tool update --global docfx

      - name: Build docs
        run: |
          set -euo pipefail
          export PATH="$PATH:$HOME/.dotnet/tools"
          docfx

      - name: Copy generated site into live repo
        run: |
          set -euo pipefail
          cp -a _site/. live/

      - name: Commit and push
        working-directory: docs/live
        env:
          GIT_AUTHOR_NAME: Automated Documentation Builder
          GIT_AUTHOR_EMAIL: nomail@alzpatz.org
          GIT_COMMITTER_NAME: Automated Documentation Builder
          GIT_COMMITTER_EMAIL: nomail@alzpatz.org
        run: |
          set -euo pipefail

          git add -A

          if git diff --cached --quiet; then
            echo "No documentation changes to publish."
            exit 0
          fi

          git commit -m "Automated Documentation Site Update"
          git push origin HEAD:master

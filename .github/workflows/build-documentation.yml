name: Build Documentation

on:
  repository_dispatch:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: build-documentation
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04

    defaults:
      run:
        shell: bash
        working-directory: docs

    steps:
      - name: Checkout Current Articles Repo
        uses: actions/checkout@v5
        with:
          path: docs
          fetch-depth: 1

      - name: Checkout Source Code Repo
        uses: actions/checkout@v5
        with:
          repository: AlzPatz/yak2d
          ref: master
          fetch-depth: 1
          path: docs/sourcerepo
          token: ${{ secrets.DOCUMENTATION_MANAGEMENT_TOKEN }}

      - name: Extract API Source and put into correct folder, then delete sourcerepo
        run: |
          set -euxo pipefail
          mkdir -p src
          cp -a sourcerepo/src/Yak2D.Api/. src/
          cp -a sourcerepo/src/Yak2D/. src/
          rm -rf sourcerepo

      - name: Checkout Live Docs Repo
        uses: actions/checkout@v5
        with:
          repository: AlzPatz/yak2d-docs
          ref: master
          fetch-depth: 1
          path: docs/live
          token: ${{ secrets.DOCUMENTATION_MANAGEMENT_TOKEN }}
          persist-credentials: true

      - name: Clear live docs repo
        working-directory: docs/live
        run: |
          set -euxo pipefail
          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +

      - name: Install Mono
        working-directory: .
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y ca-certificates gnupg curl unzip
          sudo gpg --homedir /tmp --no-default-keyring --keyring gnupg-ring:/usr/share/keyrings/mono-official-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys 3FA7E0328081BFF6A14DA29AA6A19B38D3D831EF
          sudo chmod +r /usr/share/keyrings/mono-official-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/mono-official-archive-keyring.gpg] https://download.mono-project.com/repo/ubuntu stable-focal main" | sudo tee /etc/apt/sources.list.d/mono-official-stable.list
          sudo apt-get update
          sudo apt-get install -y mono-complete

      - name: Download DocFX zip
        working-directory: .
        run: |
          set -euxo pipefail
          curl -fL https://github.com/dotnet/docfx/releases/latest/download/docfx.zip -o docfx.zip
          rm -rf .docfx
          unzip -o docfx.zip -d .docfx

      - name: Build docs with legacy DocFX
        run: |
          set -euxo pipefail
          mono ../.docfx/docfx.exe docfx.json

      - name: Copy generated site into live repo
        run: |
          set -euxo pipefail
          cp -a _site/. live/

      - name: Commit and push
        working-directory: docs/live
        env:
          GIT_AUTHOR_NAME: Automated Documentation Builder
          GIT_AUTHOR_EMAIL: nomail@alzpatz.org
          GIT_COMMITTER_NAME: Automated Documentation Builder
          GIT_COMMITTER_EMAIL: nomail@alzpatz.org
        run: |
          set -euxo pipefail
          git add -A

          if git diff --cached --quiet; then
            echo "No documentation changes to publish."
            exit 0
          fi

          git commit -m "Automated Documentation Site Update"
          git push origin HEAD:master

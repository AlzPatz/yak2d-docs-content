```yaml
name: Build Documentation

on:
  repository_dispatch:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: build-documentation
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout documentation source repo
        uses: actions/checkout@v5
        with:
          path: docs
          fetch-depth: 1

      - name: Checkout source code repo
        uses: actions/checkout@v5
        with:
          repository: AlzPatz/yak2d
          ref: master
          path: source-repo
          fetch-depth: 1
          token: ${{ secrets.DOCUMENTATION_MANAGEMENT_TOKEN }}

      - name: Checkout published docs repo
        uses: actions/checkout@v5
        with:
          repository: AlzPatz/yak2d-docs
          ref: master
          path: publish-repo
          fetch-depth: 1
          token: ${{ secrets.DOCUMENTATION_MANAGEMENT_TOKEN }}
          persist-credentials: true

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Show .NET info
        run: |
          set -euxo pipefail
          dotnet --info
          dotnet --list-sdks

      - name: Restore source projects
        working-directory: source-repo
        run: |
          set -euxo pipefail
          dotnet restore src/Yak2D/Yak2D.csproj
          dotnet restore src/Yak2D.Api/Yak2D.Api.csproj

      - name: Build source projects
        working-directory: source-repo
        run: |
          set -euxo pipefail
          dotnet build src/Yak2D/Yak2D.csproj -c Release --no-restore -p:GenerateDocumentationFile=true
          dotnet build src/Yak2D.Api/Yak2D.Api.csproj -c Release --no-restore -p:GenerateDocumentationFile=true

      - name: Install DocFX
        run: |
          set -euxo pipefail
          dotnet tool update --global docfx
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"
          "$HOME/.dotnet/tools/docfx" --version

      - name: Generate API metadata from built assemblies
        working-directory: docs
        run: |
          set -euxo pipefail

          rm -rf api obj/.cache/apidoc
          mkdir -p .tmp

          cat > .tmp/api-metadata.json <<'EOF'
          {
            "metadata": [
              {
                "src": [
                  {
                    "files": [
                      "../source-repo/src/Yak2D/bin/Release/**/*.dll",
                      "../source-repo/src/Yak2D.Api/bin/Release/**/*.dll"
                    ]
                  }
                ],
                "dest": "api",
                "disableDefaultFilter": false
              }
            ]
          }
          EOF

          docfx metadata .tmp/api-metadata.json

      - name: Build docs site
        working-directory: docs
        run: |
          set -euxo pipefail
          docfx build docfx.json

      - name: Clear published docs repo
        working-directory: publish-repo
        run: |
          set -euxo pipefail
          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +

      - name: Copy generated site into published docs repo
        run: |
          set -euxo pipefail
          cp -a docs/_site/. publish-repo/

      - name: Commit and push published site
        working-directory: publish-repo
        env:
          GIT_AUTHOR_NAME: Automated Documentation Builder
          GIT_AUTHOR_EMAIL: nomail@alzpatz.org
          GIT_COMMITTER_NAME: Automated Documentation Builder
          GIT_COMMITTER_EMAIL: nomail@alzpatz.org
        run: |
          set -euxo pipefail

          git add -A

          if git diff --cached --quiet; then
            echo "No documentation changes to publish."
            exit 0
          fi

          git commit -m "Automated Documentation Site Update"
          git push origin HEAD:master
```
